[tools]
gum = "0.17.0"
vault = "1.21.1"
fnox = "latest"
uv = "latest"

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[env]
PROJECT_ID = "sflab"
PROJECT_HOME = "{{ config_root }}"
PROJECT_SRC = "{{ config_root }}/src"
PROJECT_CONF = "{{ config_root }}/conf"
PROJECT_DOCS = "{{ config_root }}/docs"

VAULT_ADDR = "https://vault.home.sflab.io:8200"
VAULT_SKIP_VERIFY = "true"
VAULT_TOKEN = "{{ exec(command='cat ~/.vault-token') }}"

NETBOX_URL = "http://netbox.home.sflab.io/"

_.file = [
  { path = "{{env.HOME}}/.env", optional = true },
  { path = ".env", optional = true },
  { path = ".creds.env.yaml", redact = true },
]
_.path = ["./scripts"]

_.fnox-env = { tools = true }

[hooks]
enter = { task = "hooks:enter" }
